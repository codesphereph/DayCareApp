<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Daycare App</title>
<meta name="theme-color" content="#3bb4f2">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daycare App">
<style>
  :root{
    --blue:#3bb4f2;
    --blue2:#7dd4f8;
    --blue3:#1a8cc9;
    --orange:#f5a800;
    --pink:#f26ca7;
    --green:#4caf50;
    --deep:#0a1a2e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--deep);overflow:hidden}
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--deep)}

  /* ---------- splash ---------- */
  #splash{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;
    background:radial-gradient(circle at 50% 40%, #0d2340 0%, #0a1a2e 70%);
    transition:opacity .5s ease, visibility .5s ease;
  }
  #splash.hide{opacity:0;visibility:hidden}

  .logo-wrap{
    position:relative;width:200px;height:200px;
    display:flex;align-items:center;justify-content:center;
  }
  .logo-wrap img{
    width:140px;height:140px;border-radius:50%;
    box-shadow:0 0 36px rgba(59,180,242,.5);
    position:relative;z-index:2;
    object-fit:cover;
  }

  /* spinning rings matching blue/orange palette */
  .ring{position:absolute;border-radius:50%;border:2.5px solid transparent;}
  .r1{
    width:200px;height:200px;
    border-top-color:var(--blue);border-right-color:var(--blue);
    animation:spin 1.6s linear infinite;
    filter:drop-shadow(0 0 8px rgba(59,180,242,.8));
  }
  .r2{
    width:160px;height:160px;
    border-bottom-color:var(--orange);border-left-color:var(--orange);
    animation:spin 2.2s linear infinite reverse;
    filter:drop-shadow(0 0 6px rgba(245,168,0,.7));
  }
  .r3{
    width:118px;height:118px;
    border-top-color:var(--pink);border-left-color:var(--pink);
    animation:spin 1.1s linear infinite;
    filter:drop-shadow(0 0 4px rgba(242,108,167,.6));
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .brand{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#ffffff;font-weight:800;font-size:26px;letter-spacing:1px;
    text-shadow:0 0 20px rgba(59,180,242,.5);
    text-align:center;line-height:1.1;
  }
  .brand .day{color:var(--blue)}
  .brand .care{color:var(--orange)}
  .brand .appword{color:#ffffff;font-size:16px;font-weight:600;letter-spacing:4px;display:block;margin-top:2px}

  .tagline{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#4a7a9b;font-size:11px;letter-spacing:3px;
    text-transform:uppercase;margin-top:-10px;
  }

  /* dots loader */
  .dots{display:flex;gap:6px;margin-top:4px}
  .dots span{
    width:7px;height:7px;border-radius:50%;
    background:var(--blue);opacity:.3;
    animation:blink 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2){animation-delay:.2s;background:var(--orange)}
  .dots span:nth-child(3){animation-delay:.4s;background:var(--pink)}
  .dots span:nth-child(4){animation-delay:.6s;background:var(--green)}
  @keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

  .retry{margin-top:4px;display:none;font-family:-apple-system,sans-serif}
  .retry a{color:var(--orange);font-size:13px;text-decoration:underline;cursor:pointer}

  /* ---------- install banner ---------- */
  #installBanner{
    position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:linear-gradient(135deg,#0d2340 0%,#0a3a5a 100%);
    border-top:2px solid var(--blue);
    display:none;
    align-items:center;
    padding:14px 16px 18px;
    gap:12px;
    box-shadow:0 -4px 24px rgba(59,180,242,.25);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  #installBanner.show{display:flex}
  .install-icon{
    width:48px;height:48px;border-radius:12px;
    flex-shrink:0;object-fit:cover;
    box-shadow:0 2px 8px rgba(59,180,242,.4);
  }
  .install-text{flex:1}
  .install-text strong{
    display:block;color:#fff;font-size:14px;font-weight:700;
    margin-bottom:2px;
  }
  .install-text small{color:#6aadcc;font-size:11.5px}
  .install-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  #installBtn{
    background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);
    color:#fff;border:none;border-radius:20px;
    padding:8px 18px;font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;
    box-shadow:0 2px 10px rgba(59,180,242,.4);
  }
  #installBtn:active{opacity:.85}
  #dismissBanner{
    background:transparent;border:1px solid #2a5a7a;
    color:#6aadcc;border-radius:20px;
    padding:6px 14px;font-size:12px;cursor:pointer;
    white-space:nowrap;
  }
  #dismissBanner:active{opacity:.7}

  /* iOS install hint */
  #iosHint{
    position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:linear-gradient(135deg,#0d2340 0%,#0a3a5a 100%);
    border-top:2px solid var(--blue);
    display:none;
    flex-direction:column;
    align-items:center;
    padding:16px 20px 24px;
    gap:10px;
    box-shadow:0 -4px 24px rgba(59,180,242,.25);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  #iosHint.show{display:flex}
  .ios-row{display:flex;align-items:center;gap:10px}
  .ios-icon{width:40px;height:40px;border-radius:10px;object-fit:cover}
  .ios-title{color:#fff;font-size:14px;font-weight:700}
  .ios-body{color:#8bc8e8;font-size:12.5px;text-align:center;line-height:1.5}
  .ios-body b{color:var(--orange)}
  #iosClose{
    background:transparent;border:1px solid #2a5a7a;
    color:#6aadcc;border-radius:20px;
    padding:6px 20px;font-size:12px;cursor:pointer;margin-top:4px;
  }
</style>
</head>
<body>
  <iframe
    id="appFrame"
    title="Daycare App"
    allow="camera; clipboard-write; clipboard-read">
  </iframe>

  <div id="splash">
    <div class="logo-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <img src="icon.png" alt="Daycare App Logo">
    </div>
    <div class="brand">
      <span class="day">Day</span><span class="care">care</span>
      <span class="appword">A P P</span>
    </div>
    <div class="tagline">Loading&hellip;</div>
    <div class="dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="retry" id="retry">
      <a id="retryLink">Taking too long? Tap to retry</a>
    </div>
  </div>

  <!-- Android / Desktop install banner -->
  <div id="installBanner">
    <img src="icon.png" alt="icon" class="install-icon">
    <div class="install-text">
      <strong>Daycare App</strong>
      <small>Install for quick access — works offline!</small>
    </div>
    <div class="install-actions">
      <button id="installBtn">Install</button>
      <button id="dismissBanner">Not now</button>
    </div>
  </div>

  <!-- iOS Safari install hint -->
  <div id="iosHint">
    <div class="ios-row">
      <img src="icon.png" alt="icon" class="ios-icon">
      <span class="ios-title">Install Daycare App</span>
    </div>
    <p class="ios-body">
      Tap <b>Share &#x2b06;</b> then <b>"Add to Home Screen"</b><br>
      to install this app on your iPhone or iPad.
    </p>
    <button id="iosClose">Got it</button>
  </div>

<script>
  // ---- Hardcoded Apps Script web app URL ----
  var APP_URL = 'https://script.google.com/macros/s/AKfycby5GRqpXG8TR-t6Yb5gz1gCHzBeXAj0E23aG69ey81JNbc8SqdYXxHSvv2ot3TJj-pakg/exec';

  var frame   = document.getElementById('appFrame');
  var splash  = document.getElementById('splash');
  var retry   = document.getElementById('retry');
  var hidden  = false;

  function hideSplash(){ if(hidden) return; hidden = true; splash.classList.add('hide'); }

  frame.addEventListener('load', function(){ setTimeout(hideSplash, 400); });

  setTimeout(function(){ if(!hidden) retry.style.display = 'block'; }, 15000);
  document.getElementById('retryLink').addEventListener('click', function(){
    retry.style.display = 'none';
    frame.src = APP_URL + (APP_URL.indexOf('?') < 0 ? '?' : '&') + 'r=' + Date.now();
  });

  frame.src = APP_URL;

  // ---- Install Banner logic ----
  var deferredPrompt = null;
  var installBanner  = document.getElementById('installBanner');
  var installBtn     = document.getElementById('installBtn');
  var dismissBanner  = document.getElementById('dismissBanner');
  var iosHint        = document.getElementById('iosHint');

  // Don't show if already installed (standalone)
  var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                   || window.navigator.standalone === true;

  // Check if dismissed recently
  function wasDismissed(){
    try{ return localStorage.getItem('installDismissed') === '1'; }catch(e){ return false; }
  }
  function markDismissed(){
    try{ localStorage.setItem('installDismissed','1'); }catch(e){}
  }

  // Android / Chrome / Edge — capture beforeinstallprompt
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    if(!isStandalone && !wasDismissed()){
      setTimeout(function(){ installBanner.classList.add('show'); }, 2500);
    }
  });

  installBtn.addEventListener('click', function(){
    installBanner.classList.remove('show');
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
    }
  });

  dismissBanner.addEventListener('click', function(){
    installBanner.classList.remove('show');
    markDismissed();
  });

  // iOS Safari hint (no beforeinstallprompt support)
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
  if(isIOS && isSafari && !isStandalone && !wasDismissed()){
    setTimeout(function(){ iosHint.classList.add('show'); }, 3000);
  }
  document.getElementById('iosClose').addEventListener('click', function(){
    iosHint.classList.remove('show');
    markDismissed();
  });

  // Hide banner once installed
  window.addEventListener('appinstalled', function(){
    installBanner.classList.remove('show');
    iosHint.classList.remove('show');
  });

  // ---- Service Worker ----
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
